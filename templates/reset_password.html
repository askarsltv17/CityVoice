<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сброс пароля | CityVoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='20260408ap') }}" />
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon-rounded.png') }}" />
</head>
<body class="policy-body">
  <main class="policy-shell">
    <article class="surface-card policy-card">
      <span class="section-kicker">Сброс пароля</span>
      <h1>Придумайте новый пароль</h1>
      <form id="reset-password-form" class="form-grid">
        <label class="full">
          Новый пароль
          <input name="password" type="password" placeholder="Минимум 6 символов" required />
        </label>
        <button class="button primary wide" type="submit">Обновить пароль</button>
      </form>
      <p id="reset-password-message" class="inline-note">После успешной смены пароля вы сможете войти с новым паролем.</p>
    </article>
  </main>

  <script>
    const form = document.getElementById("reset-password-form");
    const message = document.getElementById("reset-password-message");
    const token = {{ token|tojson }};

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const password = String(formData.get("password") || "");

      try {
        const response = await fetch(`/api/password-reset/confirm/${token}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Не удалось обновить пароль.");
        }
        message.textContent = data.message;
        setTimeout(() => {
          window.location.href = "/?tab=account";
        }, 1200);
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
