<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Забыли пароль | CityVoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='20260408ap') }}" />
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon-rounded.png') }}" />
</head>
<body class="policy-body">
  <main class="policy-shell">
    <article class="surface-card policy-card">
      <span class="section-kicker">Восстановление доступа</span>
      <h1>Введите email для сброса пароля</h1>
      <p class="inline-note">Мы отправим письмо со ссылкой для смены пароля.</p>
      <form id="forgot-password-page-form" class="form-grid">
        <label class="full">
          Email
          <input name="email" type="email" placeholder="name@example.com" required />
        </label>
        <button class="button primary wide" type="submit">Отправить ссылку на сброс</button>
        <a class="ghost-button wide" href="/?tab=account">Вернуться ко входу</a>
      </form>
      <p id="forgot-password-page-message" class="inline-note">Письмо придёт на указанный адрес, если аккаунт существует.</p>
    </article>
  </main>

  <script>
    const form = document.getElementById("forgot-password-page-form");
    const message = document.getElementById("forgot-password-page-message");
    const params = new URLSearchParams(window.location.search);
    const presetEmail = String(params.get("email") || "").trim();

    if (presetEmail) {
      form.elements.email.value = presetEmail;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const email = String(formData.get("email") || "");

      try {
        const response = await fetch("/api/password-reset/request", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Не удалось отправить ссылку.");
        }
        form.reset();
        message.textContent = data.message;
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
